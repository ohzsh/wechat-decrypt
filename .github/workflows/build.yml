name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Python sidecars ----

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Build Python sidecars (PyInstaller)
        run: |
          pyinstaller build\build_server.spec --distpath build\dist --workpath build\work --clean --noconfirm
          pyinstaller build\build_worker.spec  --distpath build\dist --workpath build\work --clean --noconfirm

      # ---- 生成占位图标（tauri-build 校验图标文件存在） ----

      - name: Generate placeholder icons
        run: |
          pip install pillow --quiet
          python -c "
from PIL import Image
import os
os.makedirs('src-tauri/icons', exist_ok=True)
img = Image.new('RGBA', (512, 512), (9, 187, 7, 255))
img.save('src-tauri/icons/icon.png')
img.save('src-tauri/icons/icon.ico')
"

      # ---- Tauri (Rust) ----

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Check Tauri app (Rust compile check)
        run: cargo check --manifest-path src-tauri\Cargo.toml
